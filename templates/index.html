<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unificador de PDFs - Multiway</title>
</head>

<style>
  :root {
    --green: #1f6b45;
    --green-dark: #124a31;
    --green-soft: #2f7f57;
    --gold: #d2ab2c;
    --gold-dark: #b88f18;
    --text: #2f2f2f;
    --muted: #6b6b6b;
    --card: #f8f8f8;
    --border: #d8d8d8;
    --shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 20% 30%, rgba(31, 107, 69, 0.06), transparent 18%),
      radial-gradient(circle at 70% 20%, rgba(210, 171, 44, 0.10), transparent 14%),
      radial-gradient(circle at 80% 70%, rgba(31, 107, 69, 0.06), transparent 18%),
      linear-gradient(180deg, #f6f6f6 0%, #ececec 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px 24px;
    position: relative;
  }

  .background-brand {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .background-brand .bg-text {
    position: absolute;
    left: 40px;
    bottom: -18px;
    font-size: 5.2rem;
    font-weight: 300;
    color: rgba(0, 0, 0, 0.10);
    letter-spacing: -2px;
    white-space: nowrap;
  }

  .background-brand .shape {
    position: absolute;
    border-radius: 20px;
    opacity: 0.95;
    transform: skewX(-20deg);
  }

  .background-brand .shape.s1 {
    width: 140px;
    height: 26px;
    right: 270px;
    top: 245px;
    background: linear-gradient(90deg, #279159, #44ae73);
  }

  .background-brand .shape.s2 {
    width: 34px;
    height: 26px;
    right: 260px;
    top: 245px;
    background: #2f2f34;
    border-radius: 0 18px 18px 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    width: min(1280px, 100%);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 38px;
  }

  .left-brand {
    flex: 1;
    min-width: 360px;
    padding-top: 20px;
  }

  .logo-box {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .logo-box img {
    width: min(460px, 100%);
    height: auto;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.06));
  }

  .title-stack {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 10px;
    padding-left: 14px;
  }

  .title-separator {
    width: 2px;
    height: 130px;
    background: rgba(0, 0, 0, 0.18);
  }

  .title-stack h1 {
    margin: 0;
    font-size: 2.1rem;
    line-height: 1.1;
    color: var(--green);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.5px;
  }

  .card {
    width: 760px;
    max-width: 100%;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 26px 22px 22px;
    position: relative;
    backdrop-filter: blur(3px);
  }

  .card::before,
  .card::after {
    content: "";
    position: absolute;
    width: 74px;
    height: 74px;
    border-radius: 50%;
    border: 10px solid rgba(210, 171, 44, 0.85);
    clip-path: inset(0 0 44% 0);
    top: -16px;
    opacity: 0.9;
  }

  .card::before {
    right: 132px;
  }

  .card::after {
    right: 34px;
    border-color: rgba(31, 107, 69, 0.20);
    clip-path: none;
    border-radius: 8px;
    width: 52px;
    height: 52px;
    border-width: 8px;
    top: 20px;
    transform: rotate(0deg);
  }

  .header-label {
    font-size: 1.15rem;
    font-weight: 800;
    margin: 0 0 8px;
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .path-input {
    flex: 1;
    height: 42px;
    border-radius: 10px;
    border: 1px solid #c9c9c9;
    padding: 0 14px;
    font-size: 0.98rem;
    color: #444;
    background: #fdfdfd;
  }

  .browse-btn {
    height: 42px;
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(180deg, #2d7a52 0%, #1f6b45 100%);
    color: white;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(31, 107, 69, 0.24);
  }

  .grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 28px;
    align-items: start;
  }

  .sub-label {
    margin: 0 0 10px;
    font-size: 1rem;
    font-weight: 800;
  }

  .file-list-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .file-list {
    background: #fff;
    border: 2px solid #cfcfcf;
    border-radius: 14px;
    min-height: 124px;
    padding: 10px 12px;
    width: 100%;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 2px;
    font-size: 0.94rem;
  }

  .file-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .pdf-icon {
    width: 28px;
    height: 34px;
    background: linear-gradient(180deg, #5f8f66 0%, #2d6f45 100%);
    border-radius: 4px;
    position: relative;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
  }

  .pdf-icon::before {
    content: "PDF";
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.48rem;
    font-weight: 700;
    color: white;
    letter-spacing: 0.4px;
  }

  .pdf-icon::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    border-top: 9px solid #dce9df;
    border-left: 9px solid transparent;
    width: 0;
    height: 0;
    border-top-right-radius: 2px;
  }

  .file-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 230px;
  }

  .remove-btn {
    border: none;
    background: transparent;
    color: #c7a52c;
    font-size: 1.8rem;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .note-side {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--green);
    font-size: 0.95rem;
    margin-top: 24px;
  }

  .note-side .brace {
    font-size: 5rem;
    line-height: 0.7;
    color: var(--green);
    font-weight: 300;
    transform: translateY(-10px);
  }

  .note-side .arrow {
    font-size: 2rem;
    margin-left: -10px;
  }

  .bottom-row {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }

  .actions-left,
  .actions-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .btn {
    height: 46px;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 0.98rem;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
  }

  .btn-green {
    background: linear-gradient(180deg, #2d7a52 0%, #1f6b45 100%);
    color: #fff;
  }

  .btn-gold {
    background: linear-gradient(180deg, #e0bd43 0%, #d1aa28 100%);
    color: #fff;
  }

  .panel-label {
    font-size: 1rem;
    font-weight: 700;
    color: #2e2e2e;
    margin-right: 4px;
  }

  .hidden-input {
    display: none;
  }

  @media (max-width: 1180px) {
    .stage {
      flex-direction: column;
      align-items: stretch;
    }

    .left-brand {
      min-width: 0;
    }

    .card {
      width: 100%;
    }
  }

  @media (max-width: 860px) {
    .grid {
      grid-template-columns: 1fr;
    }

    .title-stack {
      flex-direction: column;
      align-items: flex-start;
    }

    .title-separator {
      display: none;
    }

    .background-brand .bg-text {
      font-size: 3.6rem;
    }

    .file-name {
      max-width: 170px;
    }
  }
</style>

<body>
  <div class="page">
    <div class="background-brand">
      <div class="bg-text">Soluções de Infraestrutura</div>
      <div class="shape s1"></div>
      <div class="shape s2"></div>
    </div>

    <div class="stage">
      <section class="left-brand">
        <div class="logo-box">
          <img src="/static/logo.png" alt="Logo">
        </div>
        <div class="title-stack">
          <div class="title-separator"></div>
          <h1>Unificador de PDFs</h1>
        </div>
      </section>

      <section class="card">
        <p class="header-label">nome do arquivo gerado</p>
        <div class="top-row">
          <input class="path-input" id="savePath" type="text" placeholder="Selecione onde salvar o PDF..." readonly />
          <button class="browse-btn" id="browseBtn" type="button">📁 Procurar...</button>
        </div>

        <div class="grid">
          <div>
            <p class="sub-label">Lista de Arquivos para Junção</p>
            <div class="file-list-wrap">
              <div class="file-list" id="fileList">
                <div class="file-item">
                  <div class="file-left">

                  </div>

                </div>
                <div class="file-item">
                  <div class="file-left">
                  </div>
                </div>
                <div class="file-item">
                  <div class="file-left">
                  </div>
                </div>
              </div>
              <div class="note-side">
                <span class="brace"></span>
                <span class="arrow">→</span>
                <span>arquivos selecionados<br />para junção</span>
              </div>
            </div>
          </div>
          <div></div>
        </div>

        <div class="bottom-row">
          <div class="actions-left">
            <label class="btn btn-green" for="pdfInput">＋ Adicionar Arquivo PDF</label>
            <input class="hidden-input" id="pdfInput" type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.ppt,.pptx"/>
            <button class="btn btn-gold" type="button" id="clearBtn">🗑 Limpar Lista</button>
          </div>

          <div class="actions-right">
            <span class="panel-label">Painel de Ação</span>
            <button class="btn btn-green" id="generateBtn" type="button">🔗 Juntar e Gerar PDF Unificado</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('pdfInput');
    const browseBtn = document.getElementById('browseBtn');
    const savePath = document.getElementById('savePath');
    const fileList = document.getElementById('fileList');
    const clearBtn = document.getElementById('clearBtn');
    const generateBtn = document.getElementById('generateBtn');

    let selectedFiles = [];

    function createFileItem(name, index) {
      const row = document.createElement('div');
      row.className = 'file-item';
      row.innerHTML = `
      <div class="file-left">
        <span class="pdf-icon"></span>
        <span class="file-name"></span>
      </div>
      <button class="remove-btn" type="button">×</button>
    `;

      row.querySelector('.file-name').textContent = name;
      row.querySelector('.remove-btn').addEventListener('click', () => {
        selectedFiles.splice(index, 1);
        renderFileList();
      });

      return row;
    }

    function renderFileList() {
      fileList.innerHTML = '';
      selectedFiles.forEach((file, index) => {
        fileList.appendChild(createFileItem(file.name, index));
      });
    }

    fileInput.addEventListener('change', (event) => {
      const files = Array.from(event.target.files || []);
      selectedFiles.push(...files);
      renderFileList();
      fileInput.value = '';
    });

    browseBtn.addEventListener('click', async () => {
      if ('showSaveFilePicker' in window) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: 'Unificado.pdf',
            types: [{
              description: 'PDF',
              accept: { 'application/pdf': ['.pdf'] }
            }]
          });

          savePath.value = handle.name;
          window.pdfSaveHandle = handle;
        } catch (err) {
          console.log('Seleção cancelada');
        }
      } else {
        alert('Seu navegador não suporta seleção direta de local. O arquivo será baixado normalmente.');
      }
    });

    clearBtn.addEventListener('click', () => {
      selectedFiles = [];
      renderFileList();
    });

    generateBtn.addEventListener('click', async () => {
      if (!selectedFiles.length) {
        alert('Adicione pelo menos um arquivo.');
        return;
      }

      const formData = new FormData();
      selectedFiles.forEach(file => {
        formData.append('files', file);
      });

      try {
        generateBtn.disabled = true;
        generateBtn.textContent = 'Processando...';

        const response = await fetch('/api/pdf/merge', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Erro ao gerar PDF.');
        }

        const downloadResponse = await fetch(data.download_url);
        if (!downloadResponse.ok) {
          throw new Error('Erro ao baixar PDF gerado.');
        }

        const blob = await downloadResponse.blob();

        if (window.pdfSaveHandle) {
          const writable = await window.pdfSaveHandle.createWritable();
          await writable.write(blob);
          await writable.close();
          alert('PDF salvo com sucesso.');
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'Unificado.pdf';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        }

      } catch (error) {
        alert(error.message);
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '🔗 Juntar e Gerar PDF Unificado';
      }
    });
  </script>
</body>

</html>
